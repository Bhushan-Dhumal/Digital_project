<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other Raw Materials</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h3 class="text-center mb-4">Other Raw Materials</h3>

    <!-- =============================
         OIL REQUIREMENT SECTION
    ============================== -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            Oil Requirement (Palm Oil)
        </div>

        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">Oil Required in Liters @33% of Input</label>
                    <input type="number" class="form-control" placeholder="4075.5">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Oil to be Replaced per Day @5%</label>
                    <input type="number" class="form-control" placeholder="203.775">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Total Oil Requirement (Liters)</label>
                    <input type="number" class="form-control" placeholder="4279">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Oil Price per Liter (Rs)</label>
                    <input type="number" class="form-control" placeholder="65">
                </div>
            </div>

        </div>
    </div>

    <!-- =============================
         OTHER ADDITIVES SECTION
    ============================== -->
    <div class="card mb-4">
        <div class="card-header bg-secondary text-white">
            Other Additives
        </div>

        <div class="card-body">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Additive</th>
                        <th>Rs/kg</th>
                        <th>gm/kg</th>
                        <th>Total Price (Rs/kg)</th>
                        <th>Rs in Crores/kg</th>
                        <th>Rs in Crores/day</th>
                    </tr>
                </thead>

                <tbody>
                    <!-- Salt -->
                    <tr>
                        <td><input class="form-control" value="Salt"></td>
                        <td><input class="form-control" value="30"></td>
                        <td><input class="form-control" value="20"></td>
                        <td><input class="form-control" value="0.6"></td>
                        <td><input class="form-control" value="0.000006"></td>
                        <td><input class="form-control" value="0.03"></td>
                    </tr>

                    <!-- Chat Masala -->
                    <tr>
                        <td><input class="form-control" value="Chat Masala"></td>
                        <td><input class="form-control" value="80"></td>
                        <td><input class="form-control" value="10"></td>
                        <td><input class="form-control" value="8"></td>
                        <td><input class="form-control" value="0.000008"></td>
                        <td><input class="form-control" value="0.04"></td>
                    </tr>

                    <!-- Paprika -->
                    <tr>
                        <td><input class="form-control" value="Paprika Flakes"></td>
                        <td><input class="form-control" value="110"></td>
                        <td><input class="form-control" value="20"></td>
                        <td><input class="form-control" value="22"></td>
                        <td><input class="form-control" value="0.000022"></td>
                        <td><input class="form-control" value="0.11"></td>
                    </tr>

                    <!-- Mint Powder -->
                    <tr>
                        <td><input class="form-control" value="Mint Powder"></td>
                        <td><input class="form-control" value="114"></td>
                        <td><input class="form-control" value="0.5"></td>
                        <td><input class="form-control" value="0.57"></td>
                        <td><input class="form-control" value="0.000000057"></td>
                        <td><input class="form-control" value="0.00285"></td>
                    </tr>

                    <!-- Red Chilli Powder -->
                    <tr>
                        <td><input class="form-control" value="Red Chilli Powder"></td>
                        <td><input class="form-control" value="104"></td>
                        <td><input class="form-control" value="0.2"></td>
                        <td><input class="form-control" value="0.2"></td>
                        <td><input class="form-control" value="0.000002"></td>
                        <td><input class="form-control" value="0.001"></td>
                    </tr>

                    <!-- Green Chilli Powder -->
                    <tr>
                        <td><input class="form-control" value="Green Chilli Powder"></td>
                        <td><input class="form-control" value="114"></td>
                        <td><input class="form-control" value="20"></td>
                        <td><input class="form-control" value="22.8"></td>
                        <td><input class="form-control" value="0.0000228"></td>
                        <td><input class="form-control" value="0.114"></td>
                    </tr>

                    <!-- Peri Peri -->
                    <tr>
                        <td><input class="form-control" value="Peri Peri"></td>
                        <td><input class="form-control" value="120"></td>
                        <td><input class="form-control" value="2"></td>
                        <td><input class="form-control" value="0.24"></td>
                        <td><input class="form-control" value="0.00000024"></td>
                        <td><input class="form-control" value="0.0012"></td>
                    </tr>

                    <!-- Tangy -->
                    <tr>
                        <td><input class="form-control" value="Tangy"></td>
                        <td><input class="form-control" value="130"></td>
                        <td><input class="form-control" value="2"></td>
                        <td><input class="form-control" value="0.26"></td>
                        <td><input class="form-control" value="0.00000026"></td>
                        <td><input class="form-control" value="0.0013"></td>
                    </tr>

                    <!-- Cheese Powder -->
                    <tr>
                        <td><input class="form-control" value="Cheese Powder"></td>
                        <td><input class="form-control" value="150"></td>
                        <td><input class="form-control" value="2"></td>
                        <td><input class="form-control" value="0.3"></td>
                        <td><input class="form-control" value="0.0000003"></td>
                        <td><input class="form-control" value="0.0015"></td>
                    </tr>

                    <!-- Lemon Powder -->
                    <tr>
                        <td><input class="form-control" value="Lemon Powder"></td>
                        <td><input class="form-control" value="115"></td>
                        <td><input class="form-control" value="0.2"></td>
                        <td><input class="form-control" value="0.23"></td>
                        <td><input class="form-control" value="0.00000023"></td>
                        <td><input class="form-control" value="0.00115"></td>
                    </tr>
                </tbody>
            </table>

            <button class="btn btn-outline-primary">Add New Additive</button>

        </div>
    </div>

</div>

</body>
</html>
